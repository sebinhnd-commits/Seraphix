
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue0:#f0f6ff;--blue1:#deeeff;--blue2:#b8d9ff;--blue3:#7ab8f5;--blue4:#4a90d9;--blue5:#2563a8;
  --pink0:#fff0f6;--pink1:#ffd6e8;--pink2:#ffb3d1;
  --lav0:#f3f0ff;--lav1:#e0d9ff;--lav2:#c4b5fd;
  --mint0:#edfaf5;--mint1:#c3f0df;
  --text:#2d3a4a;--text2:#5a6f84;--text3:#8fa8bf;
  --bg:#f5faff;--card:#fff;
  --rad:16px;--rad-sm:10px;--rad-pill:999px;
}
body{font-family:'Nunito',var(--font-sans),sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}

/* topbar */
.topbar{background:var(--card);border-bottom:1.5px solid var(--blue1);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.logo{font-size:18px;font-weight:700;color:var(--blue4);letter-spacing:-0.5px}
.logo span{color:var(--blue3)}
.nav{display:flex;gap:4px}
.nav button{background:none;border:none;padding:6px 14px;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text2);cursor:pointer;border-radius:var(--rad-pill);transition:all 0.15s;display:flex;align-items:center;gap:5px}
.nav button:hover{background:var(--blue0);color:var(--blue4)}
.nav button.active{background:var(--blue2);color:var(--blue5)}
.search-wrap{position:relative}
.search-wrap input{padding:7px 12px 7px 34px;border:1.5px solid var(--blue1);border-radius:var(--rad-pill);font-size:13px;font-family:'Nunito',sans-serif;background:var(--blue0);color:var(--text);width:180px;transition:border 0.15s}
.search-wrap input:focus{outline:none;border-color:var(--blue3);background:#fff}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}

/* pages */
.page{display:none}.page.active{display:block}
.wrap{max-width:1000px;margin:0 auto;padding:1.5rem}
#home-detail-wrap{padding-top:1.75rem}

/* char grid */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.section-title{font-size:17px;font-weight:700;color:var(--text)}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.char-card{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad);padding:1.25rem 1rem;cursor:pointer;transition:all 0.18s;text-align:center;position:relative}
.char-card:hover{border-color:var(--blue3);transform:translateY(-3px);box-shadow:0 6px 18px rgba(74,144,217,0.12)}
.char-avatar{width:64px;height:64px;border-radius:50%;border:3px solid var(--blue2);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;cursor:pointer;transition:transform 0.15s;overflow:hidden;background-size:cover;background-position:center}
.char-avatar:hover{transform:scale(1.08)}
.char-name{font-size:14px;font-weight:700;margin-bottom:3px}
.char-genre{font-size:11px;color:var(--text3);margin-bottom:8px}
.tag-wrap{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.tag{font-size:10px;padding:2px 8px;border-radius:var(--rad-pill);background:var(--blue1);color:var(--blue5);font-weight:600}
.add-card{border:1.5px dashed var(--blue2);border-radius:var(--rad);padding:1.25rem 1rem;cursor:pointer;text-align:center;color:var(--text3);transition:all 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:160px}
.add-card:hover{background:var(--blue0);border-color:var(--blue3);color:var(--blue4)}
.add-card i{font-size:26px}
.add-card span{font-size:12px;font-weight:600}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.char-card:hover .card-actions{opacity:1}
.card-act-btn{background:#fff;border:1.5px solid var(--blue1);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:12px;transition:all 0.12s}
.card-act-btn:hover{background:var(--blue1);color:var(--blue5)}
.card-act-btn.del:hover{background:#ffe0e0;color:#e24b4a}

/* detail page */
.detail-header{background:linear-gradient(135deg,#deeeff 0%,#eef4ff 60%,#ffe8f4 100%);border-radius:var(--rad);padding:2.5rem 1.75rem 2rem;margin-bottom:1.25rem;position:relative;overflow:hidden;background-size:cover;background-position:center;min-height:160px}
.detail-header.has-cover::before,.detail-header.has-cover::after{display:none}
.detail-header.has-cover .detail-top{background:rgba(255,255,255,0.78);border-radius:var(--rad-sm);padding:1rem;backdrop-filter:blur(2px)}
.detail-header::before{content:'';position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(180,215,255,0.4)}
.detail-header::after{content:'';position:absolute;right:40px;top:30px;width:60px;height:60px;border-radius:50%;background:rgba(255,210,230,0.35)}
.detail-top{display:flex;align-items:center;gap:1.25rem;position:relative;z-index:1}
.detail-avatar{width:80px;height:80px;border-radius:50%;border:4px solid #fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;flex-shrink:0;box-shadow:0 4px 12px rgba(74,144,217,0.18);overflow:hidden;background-size:cover;background-position:center}
.detail-meta h2{font-size:22px;font-weight:700;margin-bottom:3px}
.detail-meta p{font-size:13px;color:var(--text2);margin-bottom:8px}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--blue4);cursor:pointer;padding:5px 0;background:none;border:none;font-family:'Nunito',sans-serif;margin-bottom:.75rem}
.back-btn:hover{color:var(--blue5)}
.cover-edit-btn{position:absolute;top:10px;right:10px;z-index:2;background:#fff;border:1.5px solid var(--blue1);border-radius:var(--rad-pill);padding:6px 14px;font-size:11px;font-weight:700;color:var(--blue4);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Nunito',sans-serif;transition:all 0.12s}
.cover-edit-btn:hover{background:var(--blue1)}

/* tabs inside detail */
.detail-tabs{display:flex;gap:6px;border-bottom:1.5px solid var(--blue1);margin-bottom:1.25rem;flex-wrap:wrap}
.dtab{background:none;border:none;padding:8px 16px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all 0.15s}
.dtab.active{color:var(--blue4);border-bottom-color:var(--blue4)}
.dtab:hover{color:var(--blue4)}

/* pages inside detail (multipages) */
.detail-pages{position:relative}
.detail-pane{display:none}.detail-pane.active{display:block}

/* prompt / memo editor */
.editor-wrap{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad);overflow:hidden}
.editor-toolbar{padding:8px 12px;background:var(--blue0);border-bottom:1px solid var(--blue1);display:flex;gap:6px;align-items:center}
.toolbar-btn{background:none;border:1px solid var(--blue2);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--blue4);cursor:pointer;transition:background 0.12s}
.toolbar-btn:hover{background:var(--blue1)}
.editor-body{width:100%;min-height:580px;padding:16px;font-family:'Nunito',sans-serif;font-size:13px;line-height:1.9;border:none;outline:none;resize:vertical;color:var(--text);background:#e8f4fd;}
.save-row{display:flex;justify-content:flex-end;padding:8px 12px;background:var(--blue0);border-top:1px solid var(--blue1);gap:8px;align-items:center}
.saved-hint{font-size:11px;color:var(--text3);transition:opacity 0.3s}

/* page nav (carousel under detail) */
.pnav{display:flex;align-items:center;gap:8px;margin-top:1.25rem}
.pnav-btn{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad-pill);padding:6px 16px;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--blue4);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.pnav-btn:hover:not(:disabled){background:var(--blue1)}
.pnav-btn:disabled{opacity:0.35;cursor:default}
.pnav-dots{display:flex;gap:5px}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--blue2);cursor:pointer;transition:background 0.15s}
.pdot.active{background:var(--blue4);width:22px;border-radius:var(--rad-pill)}

/* gallery (per-character tab) */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.g-thumb{aspect-ratio:1;border-radius:var(--rad-sm);overflow:hidden;position:relative;border:1.5px solid var(--blue1);background-size:cover;background-position:center}
.g-thumb .g-del{position:absolute;top:6px;right:6px;background:rgba(45,58,74,0.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity 0.15s;font-size:12px}
.g-thumb:hover .g-del{opacity:1}
.g-add{aspect-ratio:1;border:1.5px dashed var(--blue2);border-radius:var(--rad-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:600;transition:all 0.15s}
.g-add:hover{background:var(--blue0);border-color:var(--blue4);color:var(--blue4)}
.g-add i{font-size:22px}

/* asset prompt - global list page */
.asset-card{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad);overflow:hidden;cursor:pointer;transition:all 0.15s}
.asset-card:hover{border-color:var(--blue3);transform:translateY(-3px);box-shadow:0 6px 18px rgba(74,144,217,0.12)}
.asset-card .thumb{aspect-ratio:16/10;background:var(--blue0);display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;color:var(--text3);font-size:13px;font-weight:700}
.asset-card .thumb i{font-size:26px}
.asset-card .body{padding:10px 12px}
.asset-card .body h4{font-size:13px;font-weight:700;margin-bottom:4px}
.asset-card .body p{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

/* asset prompt accordion */
.asset-accordion{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.asset-entry{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad-sm);overflow:hidden;transition:border-color 0.15s}
.asset-entry:hover{border-color:var(--blue3)}
.asset-entry-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.asset-entry-title{font-size:13px;font-weight:700;flex:1;color:var(--text)}
.asset-entry-arrow{font-size:14px;color:var(--text3);transition:transform 0.2s;display:flex;align-items:center}
.asset-entry.open .asset-entry-arrow{transform:rotate(180deg)}
.asset-entry-body{display:none;border-top:1.5px solid var(--blue1);padding:12px 14px;background:var(--blue0)}
.asset-entry.open .asset-entry-body{display:block}
.asset-entry-content{font-size:12px;color:var(--text);line-height:1.8;white-space:pre-wrap;word-break:break-all}
.asset-entry-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:6px;transition:all 0.12s;flex-shrink:0}
.asset-entry-del:hover{background:#ffe0e0;color:#e24b4a}
.asset-add-row{display:flex;gap:8px;margin-top:4px}
.asset-add-input{flex:1;padding:8px 12px;border:1.5px solid var(--blue2);border-radius:var(--rad-sm);font-size:13px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--blue0);outline:none;transition:border 0.15s}
.asset-add-input:focus{border-color:var(--blue3);background:#fff}
.asset-add-textarea{width:100%;padding:8px 12px;border:1.5px solid var(--blue2);border-radius:var(--rad-sm);font-size:12px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--blue0);outline:none;resize:vertical;min-height:90px;margin-top:8px;transition:border 0.15s;display:none}
.asset-add-textarea:focus{border-color:var(--blue3);background:#fff}
.asset-new-form{background:var(--card);border:1.5px dashed var(--blue2);border-radius:var(--rad-sm);padding:12px 14px}
.asset-new-form-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}

/* memo page / list */
.memo-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:1.25rem}
.memo-card{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad-sm);padding:12px;cursor:pointer;transition:all 0.15s;position:relative}
.memo-card:hover{border-color:var(--blue3);transform:translateY(-2px)}
.memo-card h4{font-size:13px;font-weight:700;margin-bottom:5px}
.memo-card p{font-size:11px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.memo-date{font-size:10px;color:var(--text3);margin-top:6px}
.memo-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;opacity:0;transition:opacity 0.15s}
.memo-card:hover .memo-del{opacity:1}
.memo-del:hover{color:#e24b4a}
.add-memo{border:1.5px dashed var(--blue2);border-radius:var(--rad-sm);padding:12px;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;min-height:90px;transition:all 0.15s}
.add-memo:hover{background:var(--blue0);color:var(--blue4)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(74,130,200,0.18);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:var(--rad);padding:1.75rem;width:380px;max-width:95vw;border:1.5px solid var(--blue1);max-height:90vh;overflow-y:auto}
.modal.wide{width:480px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:1.25rem;color:var(--blue5)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:1.5px solid var(--blue1);border-radius:var(--rad-sm);font-size:13px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--blue0);transition:border 0.15s}
.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--blue3);background:#fff}
.fg textarea{height:75px;resize:none}
.fg-row{display:flex;gap:10px}
.fg-row .fg{flex:1}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.btn-p{background:var(--blue4);color:#fff;border:none;padding:8px 20px;border-radius:var(--rad-pill);font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:background 0.15s}
.btn-p:hover{background:var(--blue5)}
.btn-s{background:var(--blue0);border:1.5px solid var(--blue2);padding:8px 16px;border-radius:var(--rad-pill);font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;color:var(--text2)}
.btn-s:hover{background:var(--blue1)}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.co{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s}
.co.sel{border-color:var(--blue5)}

/* choice pills (gender/affiliation/rank/ability) */
.pill-row{display:flex;flex-wrap:wrap;gap:6px}
.pill-opt{font-size:12px;font-weight:700;padding:6px 13px;border-radius:var(--rad-pill);border:1.5px solid var(--blue2);background:var(--blue0);color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.12s}
.pill-opt.sel,.pill-opt:hover{background:var(--blue2);color:var(--blue5);border-color:var(--blue3)}

/* avatar/cover upload */
.upload-box{border:1.5px dashed var(--blue2);border-radius:var(--rad-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:700;transition:all 0.15s;overflow:hidden;position:relative;background-size:cover;background-position:center}
.upload-box:hover{background-color:var(--blue0);border-color:var(--blue4);color:var(--blue4)}
.upload-box.has-img{border-style:solid}
.upload-box.has-img .upload-label{position:absolute;inset:0;background:rgba(45,58,74,0.45);color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s}
.upload-box.has-img:hover .upload-label{opacity:1}
.upload-box i{font-size:20px}
.avatar-upload{width:80px;height:80px;border-radius:50%;margin:0 auto}
.cover-upload{width:100%;height:90px;border-radius:var(--rad-sm)}

/* toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:#2d3a4a;color:#fff;padding:8px 20px;border-radius:var(--rad-pill);font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;opacity:0;transition:all 0.25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* search highlight */
.char-card.hidden{display:none}

/* SCHEDULE / CALENDAR (global page) */
.cal-wrap{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad);padding:1.25rem}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.cal-head h3{font-size:15px;font-weight:700;color:var(--text)}
.cal-nav-btn{background:var(--blue0);border:1.5px solid var(--blue1);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue4);transition:all 0.12s}
.cal-nav-btn:hover{background:var(--blue1)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:6px 0}
.cal-cell{min-height:64px;border-radius:8px;border:1.5px solid transparent;padding:5px;cursor:pointer;transition:all 0.12s;background:var(--blue0);position:relative}
.cal-cell:hover{border-color:var(--blue3)}
.cal-cell.empty{background:transparent;cursor:default}
.cal-cell.empty:hover{border-color:transparent}
.cal-cell.today{border-color:var(--blue3);background:var(--blue1)}
.cal-daynum{font-size:11px;font-weight:700;color:var(--text2)}
.cal-cell.today .cal-daynum{color:var(--blue5)}
.cal-events{display:flex;flex-direction:column;gap:2px;margin-top:3px}
.cal-evt{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:5px;background:var(--blue2);color:var(--blue5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sched-list{margin-top:1.25rem}
.sched-item{background:var(--card);border:1.5px solid var(--blue1);border-radius:var(--rad-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sched-date-badge{background:var(--blue1);color:var(--blue5);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;flex-shrink:0;text-align:center;min-width:54px}
.sched-item-body{flex:1}
.sched-item-body h4{font-size:13px;font-weight:700;margin-bottom:2px}
.sched-item-body p{font-size:11px;color:var(--text2)}
.sched-char-tag{font-size:10px;padding:2px 8px;border-radius:var(--rad-pill);background:var(--blue1);color:var(--blue5);font-weight:700;flex-shrink:0}
.cal-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.cal-filter button{font-size:11px;font-weight:700;padding:5px 14px;border:1.5px solid var(--blue2);border-radius:var(--rad-pill);background:none;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.15s}
.cal-filter button.active,.cal-filter button:hover{background:var(--blue2);color:var(--blue5);border-color:var(--blue3)}

/* AUTH SCREEN */
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#deeeff 0%,#f5faff 50%,#ffe8f4 100%);display:flex;align-items:center;justify-content:center;z-index:500}
.auth-box{background:#fff;border-radius:var(--rad);padding:2.25rem 2rem;width:340px;max-width:90vw;border:1.5px solid var(--blue1);box-shadow:0 8px 30px rgba(74,144,217,0.12)}
.auth-box .logo{font-size:22px;text-align:center;margin-bottom:4px}
.auth-sub{text-align:center;font-size:12px;color:var(--text3);margin-bottom:1.5rem}
.auth-error{font-size:12px;color:#e24b4a;background:#ffe8e8;border-radius:var(--rad-sm);padding:8px 12px;margin-bottom:10px;display:none}

<script>
const firebaseConfig={
  apiKey:"AIzaSyDniyF2HfTsFt56oftbFNH4n59RqQP8hqs",
  authDomain:"seraphix-79c92.firebaseapp.com",
  projectId:"seraphix-79c92",
  storageBucket:"seraphix-79c92.firebasestorage.app",
  messagingSenderId:"221053033444",
  appId:"1:221053033444:web:18e064ee9e159ef10885f1"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
let currentUser=null;
let authMode='login'; /* 'login' or 'signup' */
let saveTimer=null;

function authToggleMode(){
  authMode=authMode==='login'?'signup':'login';
  document.getElementById('auth-title').textContent=authMode==='login'?'로그인하고 내 캐릭터를 관리해보세요':'새 계정을 만들어보세요';
  document.getElementById('auth-submit-btn').textContent=authMode==='login'?'로그인':'회원가입';
  document.getElementById('auth-toggle-line').innerHTML=authMode==='login'
    ?'계정이 없으신가요? <a onclick="authToggleMode()">회원가입</a>'
    :'이미 계정이 있으신가요? <a onclick="authToggleMode()">로그인</a>';
  document.getElementById('auth-error').style.display='none';
}
function showAuthError(msg){
  const e=document.getElementById('auth-error');
  e.textContent=msg;e.style.display='block';
}
const AUTH_ERR_MAP={
  'auth/invalid-email':'이메일 형식이 올바르지 않아요.',
  'auth/missing-password':'비밀번호를 입력해주세요.',
  'auth/weak-password':'비밀번호는 6자 이상이어야 해요.',
  'auth/email-already-in-use':'이미 가입된 이메일이에요. 로그인을 시도해주세요.',
  'auth/user-not-found':'등록되지 않은 이메일이에요.',
  'auth/wrong-password':'비밀번호가 일치하지 않아요.',
  'auth/invalid-credential':'이메일 또는 비밀번호가 올바르지 않아요.',
};
function authSubmit(){
  const email=document.getElementById('auth-email').value.trim();
  const pw=document.getElementById('auth-pw').value;
  document.getElementById('auth-error').style.display='none';
  if(!email||!pw){showAuthError('이메일과 비밀번호를 입력해주세요.');return}
  const fn=authMode==='login'?auth.signInWithEmailAndPassword(email,pw):auth.createUserWithEmailAndPassword(email,pw);
  fn.catch(err=>{
    showAuthError(AUTH_ERR_MAP[err.code]||'문제가 발생했어요: '+err.message);
  });
}
function authLogout(){
  if(saveTimer)clearTimeout(saveTimer);
  auth.signOut();
}

/* ---- DATA SAVE / LOAD ---- */
function serializeState(){
  return {chars,memos,schedules,nextId,nextMemoId,nextSchedId};
}
function applyState(data){
  chars=data.chars||chars;
  memos=data.memos||[];
  schedules=data.schedules||[];
  nextId=data.nextId||nextId;
  nextMemoId=data.nextMemoId||nextMemoId;
  nextSchedId=data.nextSchedId||nextSchedId;
  /* migrate old assetPrompt string -> assetEntries array */
  chars.forEach(c=>{
    if(!c.assetEntries) c.assetEntries=[];
    if(c.assetPrompt&&c.assetEntries.length===0){
      c.assetEntries.push({title:'기본 프롬프트',content:c.assetPrompt});
    }
  });
}
function scheduleSave(){
  if(!currentUser)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,800);
}
function doSave(){
  if(!currentUser)return;
  const data=serializeState();
  const sizeBytes=new Blob([JSON.stringify(data)]).size;
  if(sizeBytes>900*1024){
    showToast('저장 용량이 가득 찼어요! 이미지를 좀 줄여주세요 ㅠㅠ');
    return;
  }
  db.collection('ocspaces').doc(currentUser.uid).set(data)
    .catch(err=>{
      console.error('저장 실패',err);
      showToast('저장에 실패했어요 ㅠㅠ');
    });
}
async function loadUserData(){
  const doc=await db.collection('ocspaces').doc(currentUser.uid).get();
  if(doc.exists){
    applyState(doc.data());
  }
  refreshAll();
}
function refreshAll(){
  goHomeList();
  renderGrid();
  renderAssetPage();
  renderSchedulePage();
  renderMemoPage();
}

auth.onAuthStateChanged(async user=>{
  document.getElementById('auth-loading').style.display='none';
  if(user){
    currentUser=user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-root').style.display='block';
    document.getElementById('user-email-label').textContent=user.email;
    await loadUserData();
  } else {
    currentUser=null;
    document.getElementById('app-root').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }
});
</script>

/* ---- IMAGE COMPRESSION ---- */
/* Resizes image so longest side <= maxDim, re-encodes as JPEG at given quality.
   Returns a Promise<dataURL string>. */
function compressImage(file,maxDim,quality){
  maxDim=maxDim||900;quality=quality||0.75;
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>maxDim||h>maxDim){
          if(w>=h){h=Math.round(h*(maxDim/w));w=maxDim}
          else{w=Math.round(w*(maxDim/h));h=maxDim}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#ffffff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;
      img.src=ev.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

/* ---- CALENDAR / SCHEDULE PAGE (global) ---- */
const MONTH_NAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DOW_NAMES=['일','월','화','수','목','금','토'];
function pad2(n){return n<10?'0'+n:''+n}
function ymd(y,m,d){return `${y}-${pad2(m+1)}-${pad2(d)}`}
function renderSchedulePage(){
  const fr=document.getElementById('cal-filter');
  if(!fr)return;
  fr.innerHTML=`<button class="${schedFilter==='all'?'active':''}" onclick="setSchedFilter('all',this)">전체</button>`+
    chars.map(c=>`<button class="${schedFilter===c.id?'active':''}" onclick="setSchedFilter(${c.id},this)">${c.name}</button>`).join('');
  document.getElementById('cal-container').innerHTML=renderCalendarHTML();
}
function setSchedFilter(v,el){
  schedFilter=v;
  document.querySelectorAll('.cal-filter button').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  renderSchedulePage();
}
function renderCalendarHTML(){
  const today=new Date();
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const evts=schedFilter==='all'?schedules:schedules.filter(s=>s.charId===schedFilter);
  let cells='';
  for(let i=0;i<firstDow;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=ymd(calYear,calMonth,d);
    const isToday=(calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate());
    const dayEvts=evts.filter(s=>s.date===dateStr);
    cells+=`<div class="cal-cell ${isToday?'today':''}" onclick="openAddSchedule('${dateStr}')">
      <div class="cal-daynum">${d}</div>
      <div class="cal-events">${dayEvts.map(s=>{
        const cName=chars.find(x=>x.id===s.charId)?.name||'';
        return `<div class="cal-evt" title="${cName?cName+': ':''}${s.title}">${cName?cName+' · ':''}${s.title}</div>`;
      }).join('')}</div>
    </div>`;
  }
  const upcoming=evts.slice().sort((a,b)=>a.date.localeCompare(b.date));
  let listHtml='';
  if(upcoming.length){
    listHtml=upcoming.map(s=>{
      const cName=chars.find(x=>x.id===s.charId)?.name||'';
      return `
      <div class="sched-item">
        <div class="sched-date-badge">${s.date}</div>
        ${cName?`<span class="sched-char-tag">${cName}</span>`:''}
        <div class="sched-item-body"><h4>${s.title}</h4>${s.body?`<p>${s.body}</p>`:''}</div>
        <button class="card-act-btn del" title="삭제" onclick="deleteSchedule(${s.id})"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>`;
    }).join('');
  } else {
    listHtml=`<div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:12px;font-weight:600">아직 일정이 없어요 🌸</div>`;
  }
  return `
    <div class="cal-wrap">
      <div class="cal-head">
        <button class="cal-nav-btn" onclick="moveCalMonth(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
        <h3>${calYear}년 ${MONTH_NAMES[calMonth]}</h3>
        <button class="cal-nav-btn" onclick="moveCalMonth(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
      </div>
      <div class="cal-grid">
        ${DOW_NAMES.map(n=>`<div class="cal-dow">${n}</div>`).join('')}
        ${cells}
      </div>
      <div class="section-head" style="margin-top:1.25rem;margin-bottom:.75rem">
        <p class="section-title" style="font-size:14px">📌 일정 목록</p>
      </div>
      <div class="sched-list">${listHtml}</div>
    </div>
  `;
}
function moveCalMonth(d){
  calMonth+=d;
  if(calMonth<0){calMonth=11;calYear--}
  if(calMonth>11){calMonth=0;calYear++}
  document.getElementById('cal-container').innerHTML=renderCalendarHTML();
}
function openAddSchedule(dateStr){
  const sel=document.getElementById('s-char');
  sel.innerHTML=chars.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  if(curChar)sel.value=curChar.id;
  else if(schedFilter!=='all')sel.value=schedFilter;
  document.getElementById('s-date').value=dateStr||ymd(calYear,calMonth,1);
  document.getElementById('s-title').value='';
  document.getElementById('s-body').value='';
  document.getElementById('modal-schedule').style.display='flex';
  setTimeout(()=>document.getElementById('s-title').focus(),50);
}
function saveSchedule(){
  const charId=parseInt(document.getElementById('s-char').value);
  const date=document.getElementById('s-date').value;
  const title=document.getElementById('s-title').value.trim();
  const body=document.getElementById('s-body').value.trim();
  if(!charId){showToast('캐릭터를 선택해주세요!');return}
  if(!date||!title){showToast('날짜와 제목을 입력해주세요!');return}
  schedules.push({id:nextSchedId++,charId,date,title,body});
  document.getElementById('modal-schedule').style.display='none';
  const [y,m]=date.split('-').map(Number);
  calYear=y;calMonth=m-1;
  renderSchedulePage();
  showToast('일정이 추가됐어요! 🗓');
  scheduleSave();
}
function deleteSchedule(id){
  schedules=schedules.filter(s=>s.id!==id);
  renderSchedulePage();
  showToast('일정이 삭제됐어요!');
  scheduleSave();
}

  resetPills();
  resetAvatarBox();
  document.getElementById('char-modal-title').textContent='✏️ 캐릭터 수정';
  document.getElementById('char-save-btn').textContent='수정 완료';
  document.getElementById('f-codename').value=c.codename||'';
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-age').value=c.age||'';
  document.getElementById('f-tags').value=(c.tags||[]).join(', ');
  if(c.gender)setPill('gender',c.gender);
  if(c.affil)setPill('affil',c.affil);
  if(c.rank)setPill('rank',c.rank);
  if(c.rank2)setPill('rank2',c.rank2);
  if(c.ability)setPill('ability',c.ability);
  if(c.avatar){
    f_avatarData=c.avatar;
    const box=document.getElementById('f-avatar-box');
    box.style.backgroundImage=`url('${c.avatar}')`;
    box.classList.add('has-img');
    box.innerHTML='<span class="upload-label"><i class="ti ti-camera-plus" aria-hidden="true"></i> 변경</span>';
  }
  document.getElementById('modal-char').style.display='flex';
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}
function pickCol(i,el){selCol=i;document.querySelectorAll('.co').forEach(e=>e.classList.remove('sel'));el.classList.add('sel')}
function deleteChar(id){
  const c=chars.find(x=>x.id===id);
  if(!c)return;
  if(!confirm(`'${c.name}' 캐릭터를 삭제할까요? 관련 메모/일정도 함께 삭제됩니다.`))return;
  chars=chars.filter(x=>x.id!==id);
  memos=memos.filter(m=>m.charId!==id);
  schedules=schedules.filter(s=>s.charId!==id);
  renderGrid();
  renderAssetPage();
  renderSchedulePage();
  if(curChar&&curChar.id===id){goHomeList()}
  showToast('캐릭터가 삭제됐어요!');
  scheduleSave();
}
function saveChar(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('이름을 입력해주세요!');return}
  const tags=document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const fields={
    name,
    codename:document.getElementById('f-codename').value.trim(),
    age:document.getElementById('f-age').value.trim(),
    genre:'미분류',
    tags,col:selCol,
    gender:f_pills.gender,
    affil:f_pills.affil,
    rank:f_pills.rank,
    rank2:f_pills.rank2,
    ability:f_pills.ability,
    avatar:f_avatarData,
  };
  if(editingCharId!==null){
    const c=chars.find(x=>x.id===editingCharId);
    Object.assign(c,fields);
    showToast(`${name} 수정 완료! ✏️`);
  } else {
    const c={id:nextId++,...fields,promptKR:'',promptEN:'',cover:null,assetImg:null,assetPrompt:'',assetEntries:[],gallery:[]};
    chars.push(c);
    showToast(`${name} 추가됐어요! 🌸`);
  }
  document.getElementById('modal-char').style.display='none';
  renderGrid();
  renderAssetPage();
  renderSchedulePage();
  if(curChar&&editingCharId===curChar.id){renderDetail()}
  scheduleSave();
}

/* ---- MEMO PAGE ---- */
function renderMemoPage(){
  const list=document.getElementById('memo-list-global');
  if(!list)return;
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const filtered=q?memos.filter(m=>m.title.toLowerCase().includes(q)||m.body.toLowerCase().includes(q)):memos;
  const hint=document.getElementById('memo-search-hint');
  if(q&&hint){hint.style.display='block';hint.textContent=`"${q}" 검색 결과: ${filtered.length}개`}
  else if(hint){hint.style.display='none'}
  let html='';
  filtered.forEach(m=>{
    const cName=m.charId?chars.find(c=>c.id===m.charId)?.name:'';
    html+=`<div class="memo-card"><button class="memo-del" onclick="deleteMemo(${m.id},event)"><i class="ti ti-x" aria-hidden="true"></i></button><h4>${m.title||'(제목 없음)'}</h4><p>${m.body}</p>${cName?`<span class="tag" style="display:inline-block;margin-top:6px">${cName}</span>`:''}${!cName?`<div class="memo-date">${m.date}</div>`:''}</div>`;
  });
  html+=`<div class="add-memo" onclick="openAddMemo()"><i class="ti ti-plus" aria-hidden="true"></i> 새 메모 추가</div>`;
  list.innerHTML=html;
}
function openAddMemo(){
  document.getElementById('m-title').value='';
  document.getElementById('m-body').value='';
  const sel=document.getElementById('m-char');
  sel.innerHTML='<option value="">없음</option>'+chars.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('modal-memo').style.display='flex';
  setTimeout(()=>document.getElementById('m-title').focus(),50);
}
function saveMemo(){
  const title=document.getElementById('m-title').value.trim();
  const body=document.getElementById('m-body').value.trim();
  if(!title&&!body){showToast('내용을 입력해주세요!');return}
  const charId=parseInt(document.getElementById('m-char').value)||null;
  memos.unshift({id:nextMemoId++,title,body,charId,date:new Date().toLocaleDateString('ko-KR')});
  document.getElementById('modal-memo').style.display='none';
  showToast('메모 저장 완료! 📝');
  renderMemoPage();
  scheduleSave();
}
function deleteMemo(id,e){
  e.stopPropagation();
  memos=memos.filter(m=>m.id!==id);
  renderMemoPage();
  showToast('메모 삭제됐어요!');
  scheduleSave();
}

/* ---- SEARCH ---- */
function doSearch(q){
  const lq=q.toLowerCase();
  const activePage=document.querySelector('.page.active');
  if(activePage&&activePage.id==='page-home'){
    if(!q){renderGrid();return}
    const filtered=chars.filter(c=>c.name.toLowerCase().includes(lq)||(c.codename||'').toLowerCase().includes(lq)||c.genre.toLowerCase().includes(lq)||(c.tags||[]).some(t=>t.toLowerCase().includes(lq)));
    renderGrid(filtered);
  } else if(activePage&&activePage.id==='page-memo'){
    renderMemoPage();
  }
}

/* ---- PAGE NAV ---- */
function goPage(p,btn){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn) btn.classList.add('active');
  if(p==='memo')renderMemoPage();
  if(p==='asset')renderAssetPage();
  if(p==='schedule')renderSchedulePage();
  if(p==='home'){goHomeList();renderGrid()}
  document.getElementById('search-input').value='';
}

/* ---- TOAST ---- */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* init handled by auth.onAuthStateChanged -> loadUserData -> refreshAll */
</script>
